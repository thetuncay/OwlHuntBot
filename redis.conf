# OwlHuntBot Redis Configuration
# AOF persistence: survives restart with ≤ 1 second data loss
# Fixes A3: pity counters and cooldown keys are no longer lost on Redis restart

# Enable Append-Only File persistence
appendonly yes

# Sync AOF to disk every second (≤ 1 second data loss on crash)
appendfsync everysec

# Do not fsync during AOF rewrite (reduces I/O pressure)
no-appendfsync-on-rewrite no

# Automatically rewrite AOF when it grows by 100% over the base size
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF file name
appendfilename "appendonly.aof"
